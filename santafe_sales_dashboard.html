<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santa Fe · Sales Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Sora:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@1,9..144,500;1,9..144,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#15110e; --bg2:#1b1612; --panel:#201a16; --panel2:#26201b;
  --line:rgba(255,255,255,.075); --line2:rgba(255,255,255,.13);
  --tx:#efe7dd; --mut:#a1948a; --mut2:#6f655d;
  --ember:#e8743b; --gold:#efb44a; --teal:#3fbf9f; --blue:#7aa0f0; --mag:#d65db1;
  --pos:#5ec07a; --neg:#e26257;
  --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:
  radial-gradient(1200px 600px at 85% -10%,rgba(232,116,59,.10),transparent 60%),
  radial-gradient(900px 500px at -5% 10%,rgba(122,160,240,.06),transparent 55%),
  var(--bg);
  color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased;letter-spacing:.1px}
.num{font-family:'Sora',sans-serif;font-variant-numeric:tabular-nums}
.wrap{max-width:1240px;margin:0 auto;padding:26px 22px 70px}

/* header */
.top{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:8px}
.brand{display:flex;align-items:center;gap:14px}
.logo{width:46px;height:46px;border-radius:13px;background:linear-gradient(145deg,var(--ember),#b8431a);
  display:grid;place-items:center;font-family:'Fraunces',serif;font-style:italic;font-weight:600;font-size:24px;color:#fff;
  box-shadow:0 8px 24px rgba(232,116,59,.32),inset 0 1px 0 rgba(255,255,255,.25)}
.brand h1{font-family:'Sora';font-weight:700;font-size:20px;letter-spacing:.3px;line-height:1.1}
.brand .sub{color:var(--mut);font-size:12.5px;margin-top:2px}
.period{text-align:right;font-size:12.5px;color:var(--mut)}
.period b{display:block;font-family:'Sora';font-weight:600;color:var(--gold);font-size:14px;letter-spacing:.4px}

/* breadcrumb */
.crumb{display:flex;align-items:center;gap:9px;margin:22px 0 16px;font-size:13.5px;flex-wrap:wrap}
.crumb button{font-family:inherit;font-size:13.5px;background:none;border:none;color:var(--mut);cursor:pointer;
  padding:5px 11px;border-radius:9px;transition:.18s;border:1px solid transparent}
.crumb button:hover{color:var(--tx);background:var(--panel);border-color:var(--line)}
.crumb .here{color:var(--tx);font-weight:600;background:var(--panel);border:1px solid var(--line2)}
.crumb .sep{color:var(--mut2)}

/* kpi grid */
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px}
.kpi{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--line);
  border-radius:var(--r);padding:15px 16px 14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;inset:0 auto 0 0;width:3px;background:var(--ember);opacity:.85}
.kpi.k2::before{background:var(--gold)} .kpi.k3::before{background:var(--teal)}
.kpi.k4::before{background:var(--blue)} .kpi.k5::before{background:var(--mag)} .kpi.k6::before{background:#c98b5e}
.kpi .lab{font-size:11.5px;color:var(--mut);font-weight:500;letter-spacing:.2px}
.kpi .val{font-family:'Sora';font-weight:700;font-size:23px;margin-top:7px;line-height:1}
.kpi .val small{font-size:13px;font-weight:600;color:var(--mut);margin-left:2px}
.kpi .meta{font-size:11.5px;margin-top:7px;color:var(--mut)}
.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;font-family:'Sora'}
.pill.up{background:rgba(94,192,122,.14);color:var(--pos)} .pill.dn{background:rgba(226,98,87,.14);color:var(--neg)}

/* layout panels */
.grid{display:grid;gap:14px}
.g2{grid-template-columns:1.55fr 1fr}
.panel{background:linear-gradient(170deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--r);padding:18px 19px}
.panel h3{font-family:'Sora';font-weight:600;font-size:14px;letter-spacing:.3px;margin-bottom:3px;display:flex;align-items:center;gap:8px}
.panel .desc{color:var(--mut);font-size:12px;margin-bottom:16px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}

/* bars list */
.barrow{display:grid;grid-template-columns:150px 1fr 96px;align-items:center;gap:12px;padding:8px 9px;border-radius:11px;cursor:pointer;transition:.15s}
.barrow:hover{background:rgba(255,255,255,.04)}
.barrow.head{cursor:default;font-size:11px;color:var(--mut2);padding-bottom:4px;border-bottom:1px solid var(--line);border-radius:0;margin-bottom:4px}
.barrow.head:hover{background:none}
.bname{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bname b{color:var(--mut);font-family:'Sora';font-weight:600;font-size:11px;margin-right:6px}
.btrack{height:13px;background:rgba(255,255,255,.05);border-radius:7px;overflow:hidden;position:relative}
.bfill{height:100%;border-radius:7px;background:linear-gradient(90deg,#b8431a,var(--ember));transition:width .6s cubic-bezier(.2,.7,.2,1)}
.bval{text-align:right;font-family:'Sora';font-size:12.5px;font-weight:600}
.bval i{font-style:normal;font-size:11px;font-weight:600;margin-left:7px}
.achv-pos{color:var(--pos)} .achv-mid{color:var(--gold)} .achv-neg{color:var(--neg)}
.scroll{max-height:445px;overflow-y:auto;margin:-4px -6px 0;padding:0 6px}
.scroll::-webkit-scrollbar{width:8px} .scroll::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}

/* donut + legend */
.mixwrap{display:flex;align-items:center;gap:20px}
.legend{flex:1;display:flex;flex-direction:column;gap:9px}
.legrow{display:flex;align-items:center;gap:9px;font-size:12.5px}
.legrow .nm{flex:1;color:var(--tx)}
.legrow .pc{font-family:'Sora';font-weight:600}
.legrow .am{color:var(--mut);font-family:'Sora';font-size:11px;min-width:64px;text-align:right}

/* trend */
.trendwrap{position:relative}
.tlegend{display:flex;gap:18px;font-size:12px;color:var(--mut);margin-bottom:10px}
.tlegend span{display:flex;align-items:center;gap:6px}

/* channel detail table */
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{padding:9px 10px;text-align:right}
th{color:var(--mut2);font-weight:500;font-size:11px;border-bottom:1px solid var(--line);text-align:right}
th:first-child,td:first-child{text-align:left}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04)}
td.ch{font-weight:500}
td .num{font-family:'Sora';font-weight:600}

.foot{text-align:center;color:var(--mut2);font-size:11.5px;margin-top:34px;line-height:1.7}
@media(max-width:880px){
  .kpis{grid-template-columns:repeat(2,1fr)} .g2{grid-template-columns:1fr}
  .barrow{grid-template-columns:120px 1fr 84px}
}
.fade{animation:fade .4s ease}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>

<div class="wrap">
  <div class="top">
    <div class="brand">
      <div class="logo">S</div>

    </div>
    <div class="period">รอบข้อมูล (MTD)<b>ม.ค. – เม.ย. 2026</b></div>

  <div class="crumb" id="crumb"></div>
  <div class="kpis" id="kpis"></div>
  <div id="body"></div>

  <div class="foot">

</div>

const D = window.DASH;
const B = D.branches, MO = D.monthly, ML = D.monthLabels, MK = Object.keys(ML);
const CH = [
  {k:'dine',  nm:'ทานในร้าน (Dine In)', c:'var(--ember)'},
  {k:'take',  nm:'ซื้อกลับ (Take away)', c:'var(--gold)'},
  {k:'grab',  nm:'Grab',                 c:'var(--teal)'},
  {k:'line',  nm:'Line Man',             c:'var(--blue)'},
  {k:'shopee',nm:'Shopee Food',          c:'var(--mag)'},
];
const fmtB = n => '฿'+Math.round(n).toLocaleString('en-US');
const fmtM = n => (n/1e6).toLocaleString('th-TH',{maximumFractionDigits:2,minimumFractionDigits:2});
const fmtN = n => Math.round(n).toLocaleString('en-US');
const pct  = n => (n*100).toFixed(1)+'%';

function agg(list){
  const a={plan:0,actual:0,cust:0,labHr:0,labBaht:0,
    sale:{dine:0,take:0,grab:0,line:0,shopee:0,deliv:0},
    trans:{total:0,dine:0,take:0,grab:0,line:0,shopee:0,deliv:0}};
  list.forEach(b=>{
    a.plan+=b.plan;a.actual+=b.actual;a.cust+=b.cust;a.labHr+=b.labHr;a.labBaht+=b.labBaht;
    for(const k in a.sale)a.sale[k]+=b.sale[k];
    for(const k in a.trans)a.trans[k]+=b.trans[k];
  });
  a.pct = a.plan? a.actual/a.plan : 0;
  a.ticket = a.trans.total? a.actual/a.trans.total : 0;
  a.custAvg = a.cust? a.trans.total/a.cust : 0;
  a.labPct = a.actual? a.labBaht/a.actual : 0;
  a.prodSale = a.labHr? a.actual/a.labHr : 0;
  a.prodTrans = a.labHr? a.trans.total/a.labHr : 0;
  return a;
}
// monthly aggregate for a set of branch codes
function moAgg(codes){
  return MK.map(mk=>{
    let plan=0,act=0;
    codes.forEach(c=>{const r=MO[c]&&MO[c][mk]; if(r){plan+=r.plan;act+=r.actual;}});
    return {mk,plan,actual:act,pct:plan?act/plan:0};
  });
}
function achvClass(p){return p>=1?'achv-pos':p>=.85?'achv-mid':'achv-neg';}

let view={level:'company',zone:null,branch:null};

function kpiCards(a,extra){
  const dp = a.actual-a.plan;
  const cards=[
    {c:'',  lab:'ยอดขายจริง (MTD)', val:fmtM(a.actual), unit:' ลบ.', meta:`แผน ${fmtM(a.plan)} ลบ.`},
    {c:'k2',lab:'% บรรลุแผน', val:pct(a.pct), unit:'',
       meta:`<span class="pill ${dp>=0?'up':'dn'}">${dp>=0?'▲':'▼'} ${fmtM(Math.abs(dp))} ลบ.</span>`},
    {c:'k3',lab:'จำนวนบิล', val:fmtN(a.trans.total), unit:' บิล', meta:`ลูกค้า ${fmtN(a.cust)} คน`},
    {c:'k4',lab:'บิลเฉลี่ย', val:fmtN(a.ticket), unit:' ฿', meta:`${a.custAvg.toFixed(2)} คน/บิล`},
    {c:'k5',lab:'Labour %', val:pct(a.labPct), unit:'', meta:`${fmtN(a.labHr)} ชม.`},
    {c:'k6',lab:'Productivity', val:fmtN(a.prodSale), unit:' ฿/ชม.', meta:`${a.prodTrans.toFixed(2)} บิล/ชม.`},
  ];
  return cards.map(k=>`<div class="kpi ${k.c}"><div class="lab">${k.lab}</div>
    <div class="val">${k.val}<small>${k.unit}</small></div><div class="meta">${k.meta}</div></div>`).join('');
}

function donut(a){
  const tot = CH.reduce((s,c)=>s+a.sale[c.k],0)||1;
  let off=0, segs='';
  const R=52,C=2*Math.PI*R;
  CH.forEach(c=>{
    const frac=a.sale[c.k]/tot, len=frac*C;
    segs+=`<circle cx="70" cy="70" r="${R}" fill="none" stroke="${c.c}" stroke-width="20"
      stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 70 70)"/>`;
    off+=len;
  });
  const deliv=a.sale.grab+a.sale.line+a.sale.shopee;
  const dpc=((deliv/tot)*100).toFixed(0);
  const leg = CH.map(c=>{const v=a.sale[c.k];return `<div class="legrow">
     <span class="dot" style="background:${c.c}"></span><span class="nm">${c.nm}</span>
     <span class="pc" style="color:${c.c}">${pct(v/tot)}</span>
     <span class="am">${fmtM(v)} ลบ.</span></div>`;}).join('');
  return `<div class="mixwrap"><svg width="140" height="140" viewBox="0 0 140 140">${segs}
     <text x="70" y="64" text-anchor="middle" fill="var(--mut)" font-size="10" font-family="IBM Plex Sans Thai">Delivery</text>
     <text x="70" y="84" text-anchor="middle" fill="var(--tx)" font-size="22" font-weight="700" font-family="Sora">${dpc}%</text>
     </svg><div class="legend">${leg}</div></div>`;
}

function trend(series,title){
  const W=560,H=180,pl=44,pr=14,pt=14,pb=26;
  const max=Math.max(...series.map(s=>Math.max(s.plan,s.actual)),1)*1.1;
  const x=i=>pl+(W-pl-pr)*(series.length<2?.5:i/(series.length-1));
  const y=v=>pt+(H-pt-pb)*(1-v/max);
  const line=(key,col)=>{
    const pts=series.map((s,i)=>`${x(i)},${y(s[key])}`).join(' ');
    const dots=series.map((s,i)=>`<circle cx="${x(i)}" cy="${y(s[key])}" r="3.5" fill="${col}"/>`).join('');
    return `<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round"/>${dots}`;
  };
  const grid=[0,.25,.5,.75,1].map(f=>{const yy=pt+(H-pt-pb)*(1-f);
    return `<line x1="${pl}" y1="${yy}" x2="${W-pr}" y2="${yy}" stroke="var(--line)"/>
    <text x="${pl-8}" y="${yy+3}" text-anchor="end" fill="var(--mut2)" font-size="9" font-family="Sora">${fmtM(max*f)}</text>`;}).join('');
  const xl=series.map((s,i)=>`<text x="${x(i)}" y="${H-8}" text-anchor="middle" fill="var(--mut)" font-size="11" font-family="IBM Plex Sans Thai">${ML[s.mk]}</text>`).join('');
  return `<div class="tlegend"><span><span class="dot" style="background:var(--mut2)"></span>แผน</span>
     <span><span class="dot" style="background:var(--ember)"></span>ยอดจริง</span><span style="margin-left:auto;color:var(--mut2)">หน่วย: ล้านบาท</span></div>
     <svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${grid}
     ${line('plan','var(--mut2)')}${line('actual','var(--ember)')}${xl}</svg>`;
}

function barList(items,onClickName){
  const max=Math.max(...items.map(i=>i.actual),1);
  const rows=items.map(i=>{
    const w=(i.actual/max*100).toFixed(1);
    return `<div class="barrow" ${onClickName?`onclick="${onClickName}('${i.code||i.zone}')"`:''}>
      <div class="bname">${i.code?`<b>${i.code}</b>`:''}${i.label}</div>
      <div class="btrack"><div class="bfill" style="width:${w}%"></div></div>
      <div class="bval">${fmtM(i.actual)}<i class="${achvClass(i.pct)}">${pct(i.pct)}</i></div>
    </div>`;
  }).join('');
  return `<div class="barrow head"><div>สาขา / โซน</div><div>ยอดขายจริง (ลบ.)</div><div style="text-align:right">จริง · %แผน</div></div>
     <div class="scroll">${rows}</div>`;
}

function chTable(a){
  const rows=CH.map(c=>{const t=a.trans[c.k]||0;const s=a.sale[c.k]||0;
    return `<tr><td class="ch"><span class="dot" style="background:${c.c};margin-right:7px"></span>${c.nm}</td>
      <td><span class="num">${fmtN(s)}</span></td><td><span class="num">${fmtN(t)}</span></td>
      <td><span class="num">${t?fmtN(s/t):0}</span></td></tr>`;}).join('');
  return `<table><thead><tr><th>ช่องทาง</th><th>ยอดขาย (฿)</th><th>บิล</th><th>บิลเฉลี่ย (฿)</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function setCrumb(){
  let h=`<button class="${view.level=='company'?'here':''}" onclick="goCompany()">🏢 ทั้งบริษัท</button>`;
  if(view.zone){h+=`<span class="sep">›</span><button class="${view.level=='zone'?'here':''}" onclick="goZone('${view.zone}')">โซน ${view.zone}</button>`;}
  if(view.branch){const b=B.find(x=>x.code==view.branch);h+=`<span class="sep">›</span><button class="here">${b.code} ${b.name}</button>`;}
  document.getElementById('crumb').innerHTML=h;
}

    const ser=MK.map(mk=>{const r=MO[b.code]&&MO[b.code][mk];return {mk,plan:r?r.plan:0,actual:r?r.actual:0,pct:r?r.pct:0};});
    bodyEl.innerHTML=`<div class="grid g2 fade">
      <div class="panel"><h3>🍽️ สัดส่วนช่องทาง — ${b.name}</h3><div class="desc">มูลค่ายอดขายแยกตามช่องทาง</div>${donut(b)}</div>
      <div class="panel"><h3>📊 รายละเอียดช่องทาง</h3><div class="desc">ยอดขาย · บิล · บิลเฉลี่ย</div>${chTable(b)}</div>
    </div>
    <div class="panel fade" style="margin-top:14px"><h3>📈 แนวโน้มรายเดือน — ${b.code} ${b.name}</h3><div class="desc">แผน vs ยอดจริง · ม.ค.–เม.ย. 2026</div>${trend(ser)}</div>`;
  }
  window.scrollTo({top:0,behavior:'smooth'});
}
function goCompany(){view={level:'company',zone:null,branch:null};render();}
function goZone(z){view={level:'zone',zone:z,branch:null};render();}
function goBranch(c){const b=B.find(x=>x.code==c);view={level:'branch',zone:b.zone,branch:c};render();}
render();
</script>
